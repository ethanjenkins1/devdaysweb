name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy files to docs folder
        run: |
          mkdir -p docs
          cp index.html docs/
          cp styles.css docs/
          cp game.js docs/
          cp .nojekyll docs/
      
      - name: Commit docs folder
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Deploy: update docs folder"
      
      - name: Push changes
        run: |
          git push
