<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pokemon Memory Game</h1>
        <p class="subtitle">Match pairs of Pokemon!</p>
        
        <div class="game-board" id="gameBoard">
            <!-- Cards will be generated here by game.js -->
        </div>
        
        <button class="restart-btn" id="restartBtn">Restart Game</button>
        
        <div class="win-message" id="winMessage">
            <h2>You Won!</h2>
            <p>All matches found!</p>
            <button class="restart-btn" id="winRestartBtn">Play Again</button>
        </div>

        <div class="loading" id="loadingSpinner"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
